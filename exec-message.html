<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Message — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" /><link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" /><link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-message">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button><div class="topbar-breadcrumb"><span>Send Message</span></div></div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>
    <div class="dash-content auth-gated">
      <div class="view-header"><div><h1 class="view-title">Send Message</h1><p class="view-subtitle">Send an in-portal message to ambassadors.</p></div></div>
      <form class="portal-form" id="msgForm">
        <div class="form-section-block">
          <h3>Recipients</h3>
          <div class="pf-check" style="margin-bottom:16px;">
            <input type="checkbox" id="useFilter" />
            <label for="useFilter" style="font-weight:400;">Send to a group using filters (leave unchecked to search for individuals)</label>
          </div>

          <!-- Individual search mode (default) -->
          <div id="individualMode">
            <div class="pf-group">
              <label>Search ambassadors by name</label>
              <input type="text" id="recipientSearch" placeholder="Start typing a name…" autocomplete="off" />
            </div>
            <div id="searchResults" style="margin-bottom:12px;"></div>
            <div id="selectedRecipients" class="pf-checks"></div>
          </div>

          <!-- Filter / dropdown mode -->
          <div id="filterMode" style="display:none;">
            <div class="pf-group">
              <label>Send to</label>
              <select id="recipientFilter">
                <option value="all">All ambassadors</option>
                <option value="overdue_d2">All with an overdue D2</option>
                <option value="university">All at a specific university</option>
                <option value="first_time">All first-time ambassadors</option>
              </select>
            </div>
            <div class="pf-group" id="uniWrap" style="display:none;">
              <label>University</label>
              <select id="universitySelect"></select>
            </div>
          </div>

          <div class="pf-hint" id="recipientCount" style="color:var(--teal);font-weight:600;">—</div>
        </div>
        <div class="form-section-block">
          <h3>Message</h3>
          <div class="pf-group"><label>Subject <span class="req">*</span></label><input type="text" id="subject" required /></div>
          <div class="pf-group"><label>Body <span class="req">*</span></label><textarea id="body" required style="min-height:140px;"></textarea></div>
        </div>
        <div id="formError" class="auth-error" style="display:none;"><span id="formErrorMsg"></span></div>
        <button type="submit" class="btn-portal" id="sendBtn"><span>Send Message</span></button>
      </form>
    </div>
  </main>
  <div class="portal-toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/exec-message.js"></script>
</body>
</html>
