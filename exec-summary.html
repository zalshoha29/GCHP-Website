<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycle Summary — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" /><link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" /><link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-summary">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button><div class="topbar-breadcrumb"><span>Cycle Summary</span></div></div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>
    <div class="dash-content auth-gated">
      <div class="view-header"><div><h1 class="view-title" id="summaryTitle">Cycle Summary</h1><p class="view-subtitle">End-of-cycle statistics, generated from current data.</p></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn-portal" id="generateBtn" style="padding:11px 18px;">Generate Summary</button>
          <button class="btn-portal secondary" id="refreshBtn" style="padding:11px 18px;">Refresh Summary</button>
          <button class="btn-portal secondary" id="exportBtn" style="padding:11px 18px;">Export to Excel</button>
        </div></div>
      <div class="metric-grid" id="summaryMetrics"></div>
      <div class="portal-section"><h2>Historical Comparison</h2><div id="historyTable"><div class="empty-state">No summaries generated yet.</div></div></div>
    </div>
  </main>
  <div class="portal-toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/exec-summary.js"></script>
</body>
</html>
