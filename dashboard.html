<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" />
</head>
<body class="dash-body" data-require-role="ambassador" data-nav="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- MAIN -->
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-breadcrumb"><span>Home</span></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbarDate"></div>
        <a href="index.html" class="topbar-site-link">View Website &#8599;</a>
      </div>
    </header>

    <div class="dash-content auth-gated">
      <div class="view-header">
        <div>
          <h1 class="view-title" data-user-name>Welcome</h1>
          <p class="view-subtitle">Your fundraising activity for the current cycle.</p>
        </div>
      </div>

      <!-- Cycle banner -->
      <div id="cycleBanner"></div>

      <!-- Events -->
      <div class="portal-section">
        <h2>Your Events</h2>
        <div id="eventsContainer"><div class="empty-state">Loading your events...</div></div>
      </div>

      <!-- Lifetime stats -->
      <div class="portal-section">
        <h2>Lifetime Statistics</h2>
        <div class="lifetime-stats" id="lifetimeStats"></div>
      </div>
    </div>
  </main>

  <div class="portal-toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/dashboard.js"></script>
</body>
</html>
