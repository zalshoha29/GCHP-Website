<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycles — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" /><link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" /><link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-cycles">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button><div class="topbar-breadcrumb"><span>Cycles</span></div></div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>
    <div class="dash-content auth-gated">
      <div class="view-header"><div><h1 class="view-title">Campaign Cycles</h1><p class="view-subtitle">Create, edit, and activate fundraising cycles. Set them up in advance.</p></div>
        <button class="btn-portal" id="newCycleBtn" style="padding:11px 20px;">+ New Cycle</button></div>
      <div id="cyclesContainer"><div class="empty-state">Loading cycles...</div></div>
    </div>
  </main>

  <!-- Cycle editor slide-over -->
  <div class="slideover-overlay" id="slideoverOverlay"></div>
  <aside class="slideover" id="slideover">
    <div class="slideover-head"><h2 id="soTitle">New Cycle</h2><button class="slideover-close" id="soClose">&times;</button></div>
    <div class="slideover-body">
      <div class="pf-group"><label>Cycle Name <span class="req">*</span></label><input type="text" id="c_name" placeholder="e.g. Autumn 2026" /></div>
      <div class="pf-row">
        <div class="pf-group"><label>Start Date <span class="req">*</span></label><input type="date" id="c_start" /></div>
        <div class="pf-group"><label>End Date <span class="req">*</span></label><input type="date" id="c_end" /></div>
      </div>
      <div class="pf-row">
        <div class="pf-group"><label>D1 Deadline</label><input type="date" id="c_d1" /></div>
        <div class="pf-group"><label>D2 Deadline</label><input type="date" id="c_d2" /></div>
      </div>
      <div class="pf-group">
        <label>Scenario (applies to all events in this cycle) <span class="req">*</span></label>
        <select id="c_scenario">
          <option value="">Select…</option>
          <option value="A">A — Partner-provided dedicated donation link</option>
          <option value="B">B — Third-party fundraising platform</option>
          <option value="C Track 1">C Track 1 — Reference code, individual donor data</option>
          <option value="C Track 2">C Track 2 — Reference code, aggregate total only</option>
        </select>
        <span class="pf-hint">Changing this on an existing cycle updates every event in it.</span>
      </div>
      <div class="pf-row">
        <div class="pf-group"><label>Inactivity flag (days)</label><input type="number" id="c_inactivity" value="14" min="1" /></div>
        <div class="pf-group"><label>D2 overdue (days)</label><input type="number" id="c_overdue" value="14" min="1" /></div>
      </div>
      <div class="pf-check" style="margin:6px 0 16px;"><input type="checkbox" id="c_active" /> <label for="c_active" style="font-weight:400;">Set as the active cycle (deactivates any other active cycle)</label></div>
      <div id="cycleError" class="auth-error" style="display:none;"><span id="cycleErrorMsg"></span></div>
      <button class="btn-portal" id="saveCycleBtn">Save Cycle</button>
    </div>
  </aside>
  <div class="portal-toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/exec-cycles.js"></script>
</body>
</html>
