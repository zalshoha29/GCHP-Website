<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Ambassador — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" /><link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" /><link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-add-ambassador">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button><div class="topbar-breadcrumb"><span>Add Ambassador</span></div></div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>
    <div class="dash-content auth-gated">
      <div class="view-header"><div><h1 class="view-title">Add Ambassador</h1><p class="view-subtitle">Create a new ambassador account. They receive an email to set their password.</p></div></div>
      <form class="portal-form" id="addForm">
        <div class="form-section-block">
          <h3>New Ambassador</h3>
          <div class="pf-group"><label>Email <span class="req">*</span></label><input type="email" id="email" required /></div>
          <div class="pf-group"><label>Full Name <span class="req">*</span></label><input type="text" id="display_name" required /></div>
          <div class="pf-group"><label>University</label><input type="text" id="university" /></div>
          <div class="pf-group"><label>Phone</label><input type="text" id="phone" /></div>
          <div class="pf-hint" style="margin-bottom:8px;">An Ambassador ID (AMB-###) is assigned automatically.</div>
        </div>
        <div id="formError" class="auth-error" style="display:none;"><span id="formErrorMsg"></span></div>
        <button type="submit" class="btn-portal" id="addBtn"><span>Create Account</span></button>
      </form>
    </div>
  </main>
  <div class="portal-toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/exec-add-ambassador.js"></script>
</body>
</html>
