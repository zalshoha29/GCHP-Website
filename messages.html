<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" />
  <style>
    .msg-list { display:flex; flex-direction:column; gap:10px; max-width:760px; }
    .msg-item { background:#fff; border:1px solid var(--gray-mid); border-radius:var(--radius); padding:16px 18px; cursor:pointer; transition:box-shadow .15s; }
    .msg-item:hover { box-shadow:var(--shadow); }
    .msg-item.unread { border-left:3px solid var(--teal); background:#fafdfd; }
    .msg-head { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .msg-subject { font-weight:600; color:var(--navy); font-size:14.5px; }
    .msg-item.unread .msg-subject::before { content:'●'; color:var(--teal); font-size:9px; vertical-align:middle; margin-right:7px; }
    .msg-date { font-size:12px; color:var(--gray); white-space:nowrap; }
    .msg-body { font-size:13.5px; color:var(--gray); margin-top:8px; line-height:1.6; white-space:pre-wrap; display:none; }
    .msg-item.open .msg-body { display:block; }
    .msg-delete { background:none; border:none; color:#cbd2da; cursor:pointer; padding:3px; border-radius:5px; display:flex; align-items:center; }
    .msg-delete:hover { color:#dc2626; background:#fef2f2; }
    .msg-type { font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--gray); margin-top:8px; }
  </style>
</head>
<body class="dash-body" data-require-role="ambassador" data-nav="messages">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><span></span><span></span><span></span></button>
        <div class="topbar-breadcrumb"><span>Messages</span></div>
      </div>
      <div class="topbar-right"><a href="index.html" class="topbar-site-link">View Website &#8599;</a></div>
    </header>

    <div class="dash-content auth-gated">
      <div class="view-header">
        <div>
          <h1 class="view-title">Messages</h1>
          <p class="view-subtitle">Notifications and messages from the GCHP team.</p>
        </div>
      </div>
      <div id="msgContainer"><div class="empty-state">Loading messages...</div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/messages.js"></script>
</body>
</html>
