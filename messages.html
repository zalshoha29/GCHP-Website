<!DOCTYPE html>

<head>

  <title>Messages — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    .msg-list { display:flex; flex-direction:column; gap:10px; max-width:760px; }
    .msg-item { background:#fff; border:1px solid var(--gray-mid); border-radius:var(--radius); padding:16px 18px; cursor:pointer; transition:box-shadow .15s; }
    .msg-item:hover { box-shadow:var(--shadow); }
    .msg-item.unread { border-left:3px solid var(--teal); background:#fafdfd; }
    .msg-head { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .msg-subject { font-weight:600; color:var(--navy); font-size:14.5px; }
    .msg-item.unread .msg-subject::before { content:'●'; color:var(--teal); font-size:9px; vertical-align:middle; margin-right:7px; }
    .msg-date { font-size:12px; color:var(--gray); white-space:nowrap; }
    .msg-body { font-size:13.5px; color:var(--gray); margin-top:8px; line-height:1.6; white-space:pre-wrap; display:none; }
    .msg-item.open .msg-body { display:block; }
    .msg-delete { background:none; border:none; color:#cbd2da; cursor:pointer; padding:3px; border-radius:5px; display:flex; align-items:center; }
    .msg-delete:hover { color:#dc2626; background:#fef2f2; }
    .msg-type { font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--gray); margin-top:8px; }
  </style>
</head>
