<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Event Plan — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" />
</head>
<body class="dash-body" data-require-role="ambassador" data-nav="submit-d1">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><span></span><span></span><span></span></button>
        <div class="topbar-breadcrumb"><span id="formCrumb">Submit Event Plan</span></div>
      </div>
      <div class="topbar-right"><a href="dashboard.html" class="topbar-site-link">&#8592; Back to Home</a></div>
    </header>

    <div class="dash-content auth-gated">
      <div class="view-header">
        <div>
          <h1 class="view-title" id="formTitle">Submit Event Plan (Deliverable 1)</h1>
          <p class="view-subtitle" id="formSub">Register a new fundraising event for review by GCHP.</p>
        </div>
      </div>

      <div id="resubmitBanner"></div>

      <form class="portal-form" id="d1Form">

        <!-- Section A -->
        <div class="form-section-block">
          <h3>Section A — Ambassador &amp; Campus</h3>
          <div class="pf-group">
            <label>Campaign Cycle</label>
            <input type="text" id="campaign_cycle" class="pf-readonly" readonly />
          </div>
          <div class="pf-group">
            <label>University</label>
            <input type="text" id="university" class="pf-readonly" readonly />
          </div>
        </div>

        <!-- Section B -->
        <div class="form-section-block">
          <h3>Section B — Event Details</h3>
          <div class="pf-group">
            <label>Event Name <span class="req">*</span></label>
            <input type="text" id="event_name" required />
          </div>
          <div class="pf-group">
            <label>Activity Type</label>
            <select id="activity_type">
              <option value="">Select…</option>
              <option>Bake Sale</option><option>Quiz Night</option><option>Sports Event</option>
              <option>Auction</option><option>Raffle</option><option>Concert/Performance</option>
              <option>Art Sale</option><option>Sponsored Challenge</option><option>Film Night</option>
              <option>Market Stall</option><option>Gala/Dinner</option><option>Online Campaign</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="pf-group" id="activityOtherWrap" style="display:none;">
            <label>Please specify activity type</label>
            <input type="text" id="activity_type_other" />
          </div>
          <div class="pf-group">
            <label>Event Date <span class="req">*</span></label>
            <input type="date" id="event_date" required />
            <span class="pf-hint">Must be a future date.</span>
          </div>
          <div class="pf-group">
            <label>Location</label>
            <input type="text" id="event_location" />
          </div>
          <div class="pf-group">
            <label>Format</label>
            <select id="event_format">
              <option value="">Select…</option>
              <option>In-Person</option><option>Online</option><option>Hybrid</option>
            </select>
          </div>
          <div class="pf-group">
            <label>Event Description</label>
            <textarea id="description"></textarea>
          </div>
          <div class="pf-row">
            <div class="pf-group"><label>Expected Attendance</label><input type="number" id="expected_attendance" min="0" /></div>
            <div class="pf-group"><label>Number of Volunteers</label><input type="number" id="volunteer_count" min="0" /></div>
          </div>
        </div>

        <!-- Section C -->
        <div class="form-section-block">
          <h3>Section C — Fundraising Target</h3>
          <div class="pf-group"><label>Fundraising Target ($)</label><input type="number" id="fundraising_target" min="0" step="0.01" /></div>
        </div>

        <!-- Section D -->
        <div class="form-section-block">
          <h3>Section D — Promotion</h3>
          <div class="pf-group">
            <label>Promotion Channels</label>
            <div class="pf-checks" id="promoChannels">
              <label class="pf-check"><input type="checkbox" value="Instagram"> Instagram</label>
              <label class="pf-check"><input type="checkbox" value="TikTok"> TikTok</label>
              <label class="pf-check"><input type="checkbox" value="WhatsApp"> WhatsApp</label>
              <label class="pf-check"><input type="checkbox" value="Discord"> Discord</label>
              <label class="pf-check"><input type="checkbox" value="Email"> Email / Newsletter</label>
              <label class="pf-check"><input type="checkbox" value="In-Person"> In-Person</label>
              <label class="pf-check"><input type="checkbox" value="University Channels"> University Channels</label>
              <label class="pf-check"><input type="checkbox" value="Other" id="promoOther"> Other</label>
            </div>
            <div class="pf-group" id="promoOtherWrap" style="display:none;margin-top:10px;">
              <label>Please specify other channel(s)</label>
              <input type="text" id="promotion_other" placeholder="e.g. Student radio, campus newspaper" />
            </div>
          </div>
        </div>

        <!-- Section E -->
        <div class="form-section-block">
          <h3>Section E — Confirmation &amp; Support</h3>
          <div class="pf-checks" style="margin-bottom:16px;">
            <label class="pf-check"><input type="checkbox" id="confirm_guide" required> I have read the Activities Guide. <span class="req">*</span></label>
            <label class="pf-check"><input type="checkbox" id="confirm_nopromo" required> I will not promote this event until I receive my fundraising link from GCHP. <span class="req">*</span></label>
          </div>
          <div class="pf-group"><label>Support Requests (optional)</label><textarea id="support_requests"></textarea></div>
          <div class="pf-group"><label>Additional Comments (optional)</label><textarea id="comments"></textarea></div>
        </div>

        <div id="formError" class="auth-error" style="display:none;"><span id="formErrorMsg"></span></div>

        <button type="submit" class="btn-portal" id="submitBtn"><span>Submit Event Plan</span></button>
      </form>
    </div>
  </main>

  <div class="portal-toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/submit-d1.js"></script>
</body>
</html>
