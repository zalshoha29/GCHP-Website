<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impact Reports — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" /><link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" /><link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-impact">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button><div class="topbar-breadcrumb"><span>Impact Reports</span></div></div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>
    <div class="dash-content auth-gated">
      <div class="view-header"><div><h1 class="view-title">Impact Reports</h1><p class="view-subtitle">Upload a per-ambassador impact report PDF for a cycle. Uploading marks their completed events as delivered.</p></div></div>
      <form class="portal-form" id="uploadForm">
        <div class="form-section-block">
          <h3>Upload Impact Report</h3>
          <div class="pf-group"><label>Ambassador <span class="req">*</span></label><select id="ambSelect" required></select></div>
          <div class="pf-group"><label>Cycle <span class="req">*</span></label><select id="cycleSelect" required></select></div>
          <div class="pf-group"><label>Title <span class="req">*</span></label><input type="text" id="title" placeholder="e.g. Spring 2026 Impact Report" required /></div>
          <div class="pf-group"><label>Description (optional)</label><textarea id="description"></textarea></div>
          <div class="pf-group"><label>PDF File <span class="req">*</span></label><input type="file" id="pdfFile" accept="application/pdf" required /></div>
          <div id="formError" class="auth-error" style="display:none;"><span id="formErrorMsg"></span></div>
          <button type="submit" class="btn-portal" id="uploadBtn"><span>Upload &amp; Mark Delivered</span></button>
        </div>
      </form>
      <div class="portal-section"><h2>Existing Impact Reports</h2><div id="existingContainer"><div class="empty-state">Loading...</div></div></div>
    </div>
  </main>
  <div class="portal-toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/exec-impact.js"></script>
</body>
</html>
