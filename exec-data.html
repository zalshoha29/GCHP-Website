<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Editor — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" /><link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" /><link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-data">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button><div class="topbar-breadcrumb"><span>Data Editor</span></div></div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>
    <div class="dash-content auth-gated">
      <div class="view-header"><div><h1 class="view-title">Data Editor</h1><p class="view-subtitle">Search and edit event records. All changes are logged to the audit trail.</p></div></div>
      <div class="exec-toolbar">
        <label>Search
          <select id="searchMode">
            <option value="events">Events</option>
            <option value="ambassadors">Ambassadors</option>
          </select>
        </label>
        <input type="text" id="searchInput" placeholder="Search…" style="min-width:280px;" />
        <button class="btn-portal secondary" id="searchBtn" style="padding:8px 18px;">Search</button>
        <label class="pf-check" style="margin:0;"><input type="checkbox" id="enableEditing" /> <span style="font-weight:600;">Enable editing</span></label>
        <button class="btn-portal secondary" id="auditToggle" style="padding:8px 18px;">View Audit Log</button>
      </div>
      <div id="searchResults"></div>
      <div id="editPanel"></div>
      <div id="auditPanel" style="display:none;"></div>
    </div>
  </main>
  <div class="modal-overlay" id="reasonModal">
    <div class="modal-box">
      <h3>Reason for change</h3>
      <p style="font-size:13px;color:var(--gray);margin:0 0 12px;">This will be recorded in the audit log. Required.</p>
      <textarea id="reasonText" placeholder="Why are you making this change?"></textarea>
      <div class="modal-actions">
        <button class="btn-portal secondary" id="reasonCancel">Cancel</button>
        <button class="btn-portal" id="reasonConfirm">Save Changes</button>
      </div>
    </div>
  </div>
  <div class="portal-toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/exec-data.js"></script>
</body>
</html>
