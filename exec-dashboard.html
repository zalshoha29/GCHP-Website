<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Deliverables — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" />
  <link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-dashboard">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar"><span></span><span></span><span></span></button>
        <div class="topbar-breadcrumb"><span>Pending Deliverables</span></div>
      </div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>

    <div class="dash-content auth-gated">
      <div class="view-header">
        <div>
          <h1 class="view-title">Pending Deliverables</h1>
          <p class="view-subtitle">Event plans awaiting review. Click a row to view the full submission.</p>
        </div>
      </div>

      <div class="exec-toolbar">
        <label>Sort by
          <select id="sortBy">
            <option value="date_pre_form_received">Date received</option>
            <option value="university">University</option>
            <option value="event_date">Event date</option>
            <option value="activity_type">Activity type</option>
          </select>
        </label>
      </div>

      <div id="queueContainer"><div class="empty-state">Loading pending submissions...</div></div>

      <div class="portal-section" style="margin-top:32px;">
        <h2>All Events — This Cycle</h2>
        <p style="font-size:13px;color:var(--gray);margin:-6px 0 14px;">Every event in the active cycle, at all stages. Filter by status below.</p>
        <div class="exec-toolbar"><label>Status <select id="allStatusFilter"><option value="">All statuses</option></select></label></div>
        <div id="allEventsContainer"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
  </main>

  <!-- Slide-over detail panel -->
  <div class="slideover-overlay" id="slideoverOverlay"></div>
  <aside class="slideover" id="slideover">
    <div class="slideover-head">
      <h2 id="soTitle">Submission</h2>
      <button class="slideover-close" id="soClose">&times;</button>
    </div>
    <div class="slideover-body" id="soBody"></div>
    <div class="slideover-actions" id="soActions"></div>
  </aside>

  <div class="portal-toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/form-response-view.js"></script>
  <script src="portal/exec-dashboard.js"></script>
</body>
</html>
