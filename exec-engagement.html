<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engagement Health — GCHP Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" /><link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="portal/portal.css" /><link rel="stylesheet" href="portal/exec.css" />
</head>
<body class="dash-body" data-require-role="executive" data-nav="exec-engagement">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left"><button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button><div class="topbar-breadcrumb"><span>Engagement Health</span></div></div>
      <div class="topbar-right"><div class="topbar-date" id="topbarDate"></div></div>
    </header>
    <div class="dash-content auth-gated">
      <div class="view-header"><div><h1 class="view-title">Engagement Health</h1><p class="view-subtitle">Live metrics, calculated from current data.</p></div></div>

      <div class="portal-section">
        <h2>Overall — All Cycles</h2>
        <p style="font-size:13px;color:var(--gray);margin:-6px 0 14px;">All-time totals across every cycle.</p>
        <div class="metric-grid" id="overallGrid"></div>
      </div>

      <div class="portal-section">
        <h2>By Cycle</h2>
        <div class="exec-toolbar">
          <label>Cycle <select id="cycleSelect"></select></label>
        </div>
        <div class="metric-grid" id="cycleGrid"></div>
        <h2 style="margin-top:8px;">Per-Ambassador Breakdown (selected cycle)</h2>
        <div id="ambTable"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
  </main>
  <div class="portal-toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/supabase-client.js"></script>
  <script src="portal/auth-guard.js"></script>
  <script src="portal/exec-engagement.js"></script>
</body>
</html>
